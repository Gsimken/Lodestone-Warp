name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.0.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    env:
      MODRINTH_ID: ${{ vars.MODRINTH_ID }}
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      CURSEFORGE_ID: ${{ vars.CURSEFORGE_ID }}
      CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '25'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Derive versions
        id: versions
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          MINECRAFT_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2)
          ARCHIVES_NAME=$(grep '^archives_base_name=' gradle.properties | cut -d'=' -f2)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="$GITHUB_REF_NAME"
          fi
          echo "mod_version=$MOD_VERSION" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=$MINECRAFT_VERSION" >> "$GITHUB_OUTPUT"
          echo "archives_name=$ARCHIVES_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "jar_file=build/libs/$ARCHIVES_NAME-$MOD_VERSION.jar" >> "$GITHUB_OUTPUT"
          echo "sources_file=build/libs/$ARCHIVES_NAME-$MOD_VERSION-sources.jar" >> "$GITHUB_OUTPUT"
          echo "release_notes=build/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Prepare release notes
        run: |
          NOTES_FILE=".github/release-notes/${{ steps.versions.outputs.mod_version }}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" "${{ steps.versions.outputs.release_notes }}"
          else
            {
              echo "# Lodestone Warps ${{ steps.versions.outputs.mod_version }}"
              echo
              echo "Release build for ${{ github.ref_name }}."
            } > "${{ steps.versions.outputs.release_notes }}"
          fi
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${{ steps.versions.outputs.release_tag }}$" | head -n 1 || true)
          {
            echo
            echo "## Commits Included"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              git log --pretty=format:'- %s (%h)' "$PREVIOUS_TAG..HEAD"
            else
              git log --pretty=format:'- %s (%h)'
            fi
            echo
          } >> "${{ steps.versions.outputs.release_notes }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versions.outputs.release_tag }}
          name: Lodestone Warps ${{ steps.versions.outputs.mod_version }}
          body_path: ${{ steps.versions.outputs.release_notes }}
          overwrite_files: true
          files: |
            ${{ steps.versions.outputs.jar_file }}
            ${{ steps.versions.outputs.sources_file }}

      - name: Publish to CurseForge
        if: env.CURSEFORGE_ID != '' && env.CURSEFORGE_TOKEN != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ env.CURSEFORGE_ID }}
          curseforge-token: ${{ env.CURSEFORGE_TOKEN }}
          files: ${{ steps.versions.outputs.jar_file }}
          name: Lodestone Warps ${{ steps.versions.outputs.mod_version }}
          version: ${{ steps.versions.outputs.mod_version }}
          version-type: release
          changelog-file: ${{ steps.versions.outputs.release_notes }}
          loaders: fabric
          game-versions: ${{ steps.versions.outputs.minecraft_version }}
          java: 25
          dependencies: |
            fabric-api(required)

      - name: Publish to Modrinth
        if: env.MODRINTH_ID != '' && env.MODRINTH_TOKEN != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ env.MODRINTH_ID }}
          modrinth-token: ${{ env.MODRINTH_TOKEN }}
          files: ${{ steps.versions.outputs.jar_file }}
          name: Lodestone Warps ${{ steps.versions.outputs.mod_version }}
          version: ${{ steps.versions.outputs.mod_version }}
          version-type: release
          changelog-file: ${{ steps.versions.outputs.release_notes }}
          loaders: fabric
          game-versions: ${{ steps.versions.outputs.minecraft_version }}
          java: 25
          dependencies: |
            fabric-api(required)
