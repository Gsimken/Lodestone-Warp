name: build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022]
        java: [25]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: ${{ matrix.java }}
          cache: 'gradle'

      - name: Make gradlew executable (non-Windows)
        if: ${{ runner.os != 'Windows' }}
        run: chmod +x ./gradlew

      - name: Derive mod and MC versions (Linux only)
        if: ${{ runner.os == 'Linux' }}
        id: versions
        shell: bash
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          MC_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2)
          ARCHIVES_NAME=$(grep '^archives_base_name=' gradle.properties | cut -d'=' -f2)
          echo "mod_version=$MOD_VERSION" >> "$GITHUB_OUTPUT"
          echo "mc_version=$MC_VERSION" >> "$GITHUB_OUTPUT"
          echo "archives_name=$ARCHIVES_NAME" >> "$GITHUB_OUTPUT"

      - name: Build (Linux/macOS)
        if: ${{ runner.os != 'Windows' }}
        run: ./gradlew build --no-daemon

      - name: Build (Windows)
        if: ${{ runner.os == 'Windows' }}
        run: .\gradlew.bat build --no-daemon
        shell: powershell

      - name: Capture build artifacts
        if: ${{ runner.os == 'Linux' && matrix.java == '25' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.versions.outputs.archives_name }}-${{ steps.versions.outputs.mod_version }}-mc${{ steps.versions.outputs.mc_version }}
          path: |
            build/libs/${{ steps.versions.outputs.archives_name }}-${{ steps.versions.outputs.mod_version }}.jar
            build/libs/${{ steps.versions.outputs.archives_name }}-${{ steps.versions.outputs.mod_version }}-sources.jar
